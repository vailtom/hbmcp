; dbf_mcp.ini - sample configuration
;
; Place next to dbf_mcp.exe, or point env var DBF_MCP_CONFIG at a custom
; path. Env var DBF_ROOT overrides active_root at startup.

[general]
active_root     = C:\NetPlus\data
encoding        = cp850
deleted_default = true

[roots]
default = C:\NetPlus\data
demo    = C:\NetPlus\demo
backup  = D:\Backups\NetPlus

